<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tic-Tac-Toe</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
:root{--bg:#0a0a0f;--surface:#111118;--surface-2:#1a1a24;--border:#2a2a3a;--border-bright:#3a3a5a;--x-color:#ff4d6d;--x-glow:rgba(255,77,109,0.35);--o-color:#4df0c8;--o-glow:rgba(77,240,200,0.35);--accent:#7b61ff;--accent-glow:rgba(123,97,255,0.3);--text:#e8e8f0;--text-muted:#6b6b88;--win-glow:rgba(255,220,80,0.4);--win-color:#ffd850;--font-mono:'Space Mono',monospace;--font-display:'Syne',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;overflow-x:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(123,97,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(123,97,255,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem 4rem;gap:2.5rem}
.header{text-align:center;display:flex;flex-direction:column;align-items:center;gap:.5rem}
.header__logo{display:flex;align-items:center;gap:.4rem;font-family:var(--font-display);font-size:2rem;font-weight:800;line-height:1}
.logo-x{color:var(--x-color);text-shadow:0 0 20px var(--x-glow)}
.logo-sep{color:var(--text-muted)}
.logo-o{color:var(--o-color);text-shadow:0 0 20px var(--o-glow)}
.header__title{font-family:var(--font-display);font-size:clamp(2rem,5vw,3.5rem);font-weight:800;letter-spacing:-.03em}
.header__sub{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);border:1px solid var(--border);padding:.2rem .8rem;border-radius:2px}
.game{display:flex;gap:3rem;align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%;max-width:900px}
.status{display:flex;align-items:center;gap:.6rem;font-size:.85rem;letter-spacing:.05em;font-weight:700;padding:.6rem 1rem;border-radius:4px;border:1px solid var(--border);background:var(--surface);margin-bottom:1.25rem;min-height:42px;transition:all .3s}
.status__indicator{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:pulse 1.4s ease-in-out infinite}
.status--x{color:var(--x-color);border-color:var(--x-color)}.status--x .status__indicator{background:var(--x-color);box-shadow:0 0 8px var(--x-glow)}
.status--o{color:var(--o-color);border-color:var(--o-color)}.status--o .status__indicator{background:var(--o-color);box-shadow:0 0 8px var(--o-glow)}
.status--winner{color:var(--win-color);border-color:var(--win-color)}.status--winner .status__indicator{background:var(--win-color);box-shadow:0 0 8px var(--win-glow);animation:none}
.status--draw{color:var(--text-muted)}.status--draw .status__indicator{background:var(--text-muted);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.board-container{display:flex;flex-direction:column;align-items:flex-start}
.board{display:grid;grid-template-rows:repeat(3,1fr);gap:0;border:1px solid var(--border-bright);border-radius:6px;overflow:hidden;box-shadow:0 0 60px rgba(123,97,255,.08),0 20px 40px rgba(0,0,0,.5)}
.board__row{display:grid;grid-template-columns:repeat(3,1fr)}
.square{width:clamp(90px,18vw,120px);height:clamp(90px,18vw,120px);background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:background .15s}
.square:hover{background:var(--surface-2)}
.square--winning{background:var(--surface-2)!important;box-shadow:inset 0 0 30px var(--win-glow);border-color:var(--win-color)!important;animation:winPop .4s ease-out}
@keyframes winPop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
.square__symbol{font-family:var(--font-display);font-size:clamp(2rem,6vw,3rem);font-weight:800;line-height:1;animation:symbolIn .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes symbolIn{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.sym-x{color:var(--x-color);text-shadow:0 0 18px var(--x-glow)}
.sym-o{color:var(--o-color);text-shadow:0 0 18px var(--o-glow)}
.sidebar{display:flex;flex-direction:column;gap:1.5rem;min-width:200px;max-width:260px;padding-top:3.5rem}
.sidebar__actions{display:flex;flex-direction:column;gap:.6rem}
.btn{font-family:var(--font-mono);font-size:.75rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.65rem 1rem;border-radius:4px;border:1px solid;cursor:pointer;transition:all .15s}
.btn--reset{background:var(--x-color);border-color:var(--x-color);color:#0a0a0f}.btn--reset:hover{background:transparent;color:var(--x-color);box-shadow:0 0 20px var(--x-glow)}
.btn--history{background:transparent;border-color:var(--border-bright);color:var(--text-muted)}.btn--history:hover{border-color:var(--accent);color:var(--accent)}
.history{border:1px solid var(--border);border-radius:4px;background:var(--surface);padding:1rem;animation:slideDown .2s ease-out}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.history__title,.legend__title{font-family:var(--font-display);font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.75rem}
.history__list{list-style:none;display:flex;flex-direction:column;gap:.35rem;max-height:220px;overflow-y:auto}
.history-btn{display:flex;align-items:center;gap:.5rem;width:100%;text-align:left;font-family:var(--font-mono);font-size:.72rem;padding:.4rem .6rem;background:transparent;border:1px solid transparent;border-radius:4px;color:var(--text-muted);cursor:pointer;transition:all .1s}
.history-btn:hover{background:var(--surface-2);border-color:var(--border);color:var(--text)}
.history-btn--active{background:var(--surface-2);border-color:var(--accent);color:var(--accent)}
.history-btn__dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.legend{border:1px solid var(--border);border-radius:4px;background:var(--surface);padding:1rem}
.legend__list{list-style:none;display:flex;flex-direction:column;gap:.5rem}
.legend__list li{font-size:.72rem;color:var(--text-muted);line-height:1.4;padding-left:.75rem;border-left:2px solid var(--border-bright)}
.legend__list li strong{color:var(--accent);font-weight:700}
.legend__list li code{color:var(--o-color);background:rgba(77,240,200,.08);padding:.05em .3em;border-radius:2px;font-family:var(--font-mono);font-size:.9em}
@media(max-width:600px){.game{flex-direction:column;align-items:center}.sidebar{padding-top:0;max-width:100%;width:100%}.sidebar__actions{flex-direction:row}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

function Square({ value, onSquareClick, isWinning }) {
  return (
    <button
      className={`square ${value ? "square--filled" : ""} ${isWinning ? "square--winning" : ""}`}
      onClick={onSquareClick}
    >
      <span className={`square__symbol ${value === "X" ? "sym-x" : value === "O" ? "sym-o" : ""}`}>
        {value}
      </span>
    </button>
  );
}

function Board({ xIsNext, squares, onPlay }) {
  const winInfo = calculateWinner(squares);
  const winner = winInfo?.winner;
  const winLine = winInfo?.line ?? [];

  function handleClick(i) {
    if (squares[i] || winner) return;
    const nextSquares = squares.slice();
    nextSquares[i] = xIsNext ? "X" : "O";
    onPlay(nextSquares);
  }

  const isDraw = !winner && squares.every(Boolean);
  let statusText, statusClass;
  if (winner) {
    statusText = `Player ${winner} wins!`;
    statusClass = "status--winner";
  } else if (isDraw) {
    statusText = "It's a draw!";
    statusClass = "status--draw";
  } else {
    statusText = `Player ${xIsNext ? "X" : "O"}'s turn`;
    statusClass = xIsNext ? "status--x" : "status--o";
  }

  return (
    <div className="board-container">
      <div className={`status ${statusClass}`}>
        <span className="status__indicator" />
        {statusText}
      </div>
      <div className="board">
        {[0,1,2].map(row => (
          <div key={row} className="board__row">
            {[0,1,2].map(col => {
              const idx = row * 3 + col;
              return (
                <Square
                  key={idx}
                  value={squares[idx]}
                  onSquareClick={() => handleClick(idx)}
                  isWinning={winLine.includes(idx)}
                />
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

function Game() {
  const [history, setHistory] = useState([Array(9).fill(null)]);
  const [currentMove, setCurrentMove] = useState(0);
  const [showHistory, setShowHistory] = useState(false);

  const xIsNext = currentMove % 2 === 0;
  const currentSquares = history[currentMove];

  function handlePlay(nextSquares) {
    const nextHistory = [...history.slice(0, currentMove + 1), nextSquares];
    setHistory(nextHistory);
    setCurrentMove(nextHistory.length - 1);
  }

  function jumpTo(move) { setCurrentMove(move); }

  function resetGame() {
    setHistory([Array(9).fill(null)]);
    setCurrentMove(0);
  }

  const moves = history.map((_, move) => {
    const isActive = move === currentMove;
    const label = move === 0 ? "Start" : `Move #${move}`;
    return (
      <li key={move}>
        <button
          className={`history-btn ${isActive ? "history-btn--active" : ""}`}
          onClick={() => jumpTo(move)}
        >
          <span className="history-btn__dot" />
          {label}
        </button>
      </li>
    );
  });

  return (
    <div className="app">
      <div className="bg-grid" />
      <header className="header">
        <div className="header__logo">
          <span className="logo-x">X</span>
          <span className="logo-sep">·</span>
          <span className="logo-o">O</span>
        </div>
        <h1 className="header__title">Tic-Tac-Toe</h1>
        <p className="header__sub">React State · Props · Immutability</p>
      </header>
      <main className="game">
        <Board xIsNext={xIsNext} squares={currentSquares} onPlay={handlePlay} />
        <aside className="sidebar">
          <div className="sidebar__actions">
            <button className="btn btn--reset" onClick={resetGame}>New Game</button>
            <button className="btn btn--history" onClick={() => setShowHistory(s => !s)}>
              {showHistory ? "Hide" : "Show"} History
            </button>
          </div>
          {showHistory && (
            <div className="history">
              <h2 className="history__title">Time Travel</h2>
              <ol className="history__list">{moves}</ol>
            </div>
          )}
          <div className="legend">
            <h2 className="legend__title">Architecture Notes</h2>
            <ul className="legend__list">
              <li><strong>State</strong> lives in <code>Game</code></li>
              <li><strong>Props</strong> flow down to <code>Board → Square</code></li>
              <li><strong>Immutability</strong> via <code>squares.slice()</code></li>
              <li><strong>Time Travel</strong> preserves full history array</li>
            </ul>
          </div>
        </aside>
      </main>
    </div>
  );
}

function calculateWinner(squares) {
  const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for (const [a,b,c] of lines) {
    if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
      return { winner: squares[a], line: [a,b,c] };
    }
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Game />);
</script>
</body>
</html>
